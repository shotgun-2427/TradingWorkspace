project:
  name: trading-engine
  environment: local
  default_profile: paper
  timezone: America/New_York

paths:
  market_data_root: data/market
  raw_data_dir: data/market/raw
  cleaned_data_dir: data/market/cleaned
  snapshots_dir: data/market/snapshots
  broker_data_dir: data/broker
  logs_dir: data/logs
  artifacts_dir: artifacts

runtime:
  dry_run: true
  allow_live_submit: false
  write_logs: true
  write_artifacts: true

schedule:
  market_timezone: America/New_York
  local_timezone: America/Chicago
  daily_rebalance_local_time: "14:50:00"
  end_of_day_reconcile_local_time: "15:10:00"
