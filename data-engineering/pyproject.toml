[tool.poetry]
name = "data-engineering"
version = "0.1.0"
description = ""
authors = ["Rithwik Babu <rbabu4@wisc.edu>"]
readme = "README.md"

[[tool.poetry.packages]]
include = "pipeline"
from = "src"

[[tool.poetry.packages]]
include = "api"
from = "src"

[tool.poetry.dependencies]
