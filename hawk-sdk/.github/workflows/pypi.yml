name: Publish hawk-sdk to PyPI

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semantic version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build/test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Bump version in setup.py
        id: bump
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          release_type = "${{ github.event.inputs.release_type }}"
          setup_path = Path("setup.py")
          content = setup_path.read_text()

          tag_output = subprocess.check_output(
              ["git", "tag", "--list", "v*.*.*"],
              text=True,
          ).splitlines()

          tag_pattern = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")
          parsed_tags = []
          for tag in tag_output:
              tag_match = tag_pattern.match(tag.strip())
              if tag_match:
                  parsed_tags.append(tuple(map(int, tag_match.groups())))

          if parsed_tags:
              major, minor, patch = max(parsed_tags)
          else:
              # Fallback for first release if no semver tags exist yet.
              match = re.search(r"version=['\"](\d+)\.(\d+)\.(\d+)['\"]", content)
              if not match:
                  raise SystemExit("Could not find semantic version in setup.py")
              major, minor, patch = map(int, match.groups())

          old_version = f"{major}.{minor}.{patch}"

          if release_type == "major":
              major, minor, patch = major + 1, 0, 0
          elif release_type == "minor":
              minor, patch = minor + 1, 0
          elif release_type == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported release_type: {release_type}")

          new_version = f"{major}.{minor}.{patch}"
          updated = re.sub(
              r"version=['\"]\d+\.\d+\.\d+['\"]",
              f"version='{new_version}'",
              content,
              count=1,
          )
          setup_path.write_text(updated)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"old_version={old_version}\n")
              fh.write(f"new_version={new_version}\n")
          PY

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Run tests when present
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys

          patterns = (
              "tests/test_*.py",
              "tests/*_test.py",
              "test_*.py",
              "*_test.py",
          )
          has_tests = any(
              any(pathlib.Path(".").glob(pattern))
              for pattern in patterns
          )

          if not has_tests:
              print("No pytest-style tests found; skipping pytest")
              raise SystemExit(0)

          raise SystemExit(subprocess.call([sys.executable, "-m", "pytest", "-q"]))
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Push release tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          if git rev-parse -q --verify "refs/tags/v${NEW_VERSION}" >/dev/null; then
            echo "Tag v${NEW_VERSION} already exists locally."
            exit 1
          fi
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
