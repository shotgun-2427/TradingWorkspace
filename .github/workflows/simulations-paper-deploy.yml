name: Deploy Cloud Run Job & Scheduler (simulations-paper)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloud Run Job & Scheduler (simulations-paper)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: wsb-hc-qasap-ae2e

      - name: Deploy Cloud Run Job & Scheduler (simulations-paper)
        env:
          PROJECT_ID: wsb-hc-qasap-ae2e
          REGION: us-east4
          SERVICE_ACCOUNT_EMAIL: prod-job-runner@wsb-hc-qasap-ae2e.iam.gserviceaccount.com

          # Image details
          IMAGE_NAME: simulations-paper
          IMAGE_TAG: latest   # pin to a SHA if you prefer deterministic deploys

          # App env
          NEWRELIC_API_KEY: ${{ secrets.NEWRELIC_API_KEY }}
        run: |
          set -euo pipefail

          deploy_job() {
            local JOB_NAME=$1
            local IMAGE=$2
            shift 2
            gcloud run jobs update "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --vpc-connector=run-conn-us-east4 \
              --vpc-egress=private-ranges-only \
              --max-retries 3 \
              "$@" || \
            gcloud run jobs create "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --vpc-connector=run-conn-us-east4 \
              --vpc-egress=private-ranges-only \
              --max-retries 3 \
              "$@"
          }

          deploy_scheduler() {
            local NAME=$1
            local CRON=$2
            local JOB=$3
            local TZ=$4
            gcloud scheduler jobs update http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="$TZ" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" || \
            gcloud scheduler jobs create http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="$TZ" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform"
          }

          # ----- simulations-paper -----
          JOB_NAME="simulations-paper-job"
          SCHEDULER_NAME="simulations-paper-scheduler"
          FULL_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"

          # Deploy the job (add/remove env vars as needed for simulations)
          deploy_job "$JOB_NAME" "$FULL_IMAGE" \
            --set-env-vars=environment=prod,variant=paper,NEWRELIC_API_KEY=$NEWRELIC_API_KEY \
            --cpu=1 --memory=1Gi --tasks=1

          # Schedule at 7:00 PM America/Chicago daily
          # (CRON is evaluated in the provided time-zone)
          deploy_scheduler simulations-paper-scheduler "0 19 * * 1-5" simulations-paper-job "America/Chicago"
