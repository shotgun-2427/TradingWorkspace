name: CI / Build / Deploy

on:
  push:

jobs:
  # 1) Run tests on every branch
  test:
    name: Test & Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run pytest with coverage threshold
        run: poetry run pytest --cov=src/trading_engine --cov-fail-under=80

  # 2) Build (only on main, after tests pass)
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker images
        run: |
          REGION="us-central1"
          PROJECT_ID="wsb-hc-qasap-ae2e"

          docker buildx create --use || echo "Builder already exists"

          docker buildx build \
            --platform linux/amd64 \
            -t gcr.io/$PROJECT_ID/production-engineering \
            -f src/production/Dockerfile . \
            --push

  # 3) Deploy (only on main, after build)
  deploy:
    name: Deploy to Cloud Run & Scheduler
    runs-on: ubuntu-latest
    environment: production
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: wsb-hc-qasap-ae2e

      - name: Deploy Cloud Run Jobs and Scheduler
        env:
          PROJECT_ID: wsb-hc-qasap-ae2e
          REGION: us-central1
          SERVICE_ACCOUNT_EMAIL: prod-job-runner@wsb-hc-qasap-ae2e.iam.gserviceaccount.com
          NEWRELIC_API_KEY: ${{ secrets.NEWRELIC_API_KEY }}
        run: |
          deploy_job() {
            local JOB_NAME=$1
            local IMAGE=$2
            shift 2
            gcloud run jobs update "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --max-retries 3 \
              "$@" || \
            gcloud run jobs create "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --max-retries 3 \
              "$@"
          }

          deploy_scheduler() {
            local NAME=$1
            local CRON=$2
            local JOB=$3
            gcloud scheduler jobs update http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="UTC" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" || \
            gcloud scheduler jobs create http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="UTC" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform"
          }

          deploy_job production-job production-engineering \
            --set-env-vars=environment=prod,NEWRELIC_API_KEY=$NEWRELIC_API_KEY

          deploy_scheduler production-engineering-scheduler "50 19 * * *" production-job
