name: CI / Build / Deploy

on:
  push:

jobs:
  # 1) Run tests on every branch
  test:
    name: Test & Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run pytest with coverage threshold
        run: poetry run pytest --cov=src/trading_engine --cov-fail-under=0

  # 2) Build (only on main, after tests pass)
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker images
        run: |
          REGION="us-central1"
          PROJECT_ID="wsb-hc-qasap-ae2e"

          docker buildx create --use || echo "Builder already exists"

          docker buildx build \
            --platform linux/amd64 \
            -t gcr.io/$PROJECT_ID/production-engineering \
            -f src/production/Dockerfile . \
            --push
