name: Manual Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloud Run & Scheduler
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: wsb-hc-qasap-ae2e

      - name: Deploy Cloud Run Jobs and Scheduler
        env:
          PROJECT_ID: wsb-hc-qasap-ae2e
          REGION: us-east4
          SERVICE_ACCOUNT_EMAIL: prod-job-runner@wsb-hc-qasap-ae2e.iam.gserviceaccount.com
          NEWRELIC_API_KEY: ${{ secrets.NEWRELIC_API_KEY }}
          IB_HOST: 10.4.0.2 # VM’s internal IP
          IB_PORT: 4004 # 4004=paper, 4003=live
        run: |
          deploy_job() {
            local JOB_NAME=$1
            local IMAGE=$2
            shift 2
            gcloud run jobs update "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --vpc-connector=run-conn-us-east4 \
              --vpc-egress=private-ranges-only \
              --max-retries 3 \
              "$@" || \
            gcloud run jobs create "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --vpc-connector=run-conn-us-east4 \
              --vpc-egress=private-ranges-only \
              --max-retries 3 \
              "$@"
          }

          deploy_scheduler() {
            local NAME=$1
            local CRON=$2
            local JOB=$3
            gcloud scheduler jobs update http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="UTC" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" || \
            gcloud scheduler jobs create http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="UTC" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform"
          }

          deploy_job production-job production-engineering \
            --set-env-vars=environment=prod,NEWRELIC_API_KEY=$NEWRELIC_API_KEY,IB_HOST=$IB_HOST,IB_PORT=$IB_PORT,IB_CLIENT_ID=1
          
          
          deploy_scheduler production-engineering-scheduler "40 19 * * *" production-job