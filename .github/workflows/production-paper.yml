name: Release & Deploy (production-paper)

on:
  workflow_dispatch:
    inputs:
      release_level:
        description: 'Level of release (bump)'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

permissions:
  contents: write
  id-token: write

jobs:
  # -----------------------------------------------------------
  # JOB 1: Calculate Version, Create Tag, Build & Push Docker
  # -----------------------------------------------------------
  build-and-tag:
    name: Bump Version & Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      new_version: ${{ steps.create_tag.outputs.new_tag }}
      docker_image: ${{ steps.meta.outputs.IMAGE_NAME }}
      project_id: ${{ steps.meta.outputs.PROJECT_ID }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 1. Automate Versioning
      - name: Bump version and push tag
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.release_level }}
          tag_prefix: "v" 

      # 2. Authenticate
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      # 3. Define Meta
      - name: Define Image Meta
        id: meta
        run: |
          echo "PROJECT_ID=wsb-hc-qasap-ae2e" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=production-paper" >> "$GITHUB_OUTPUT"

      - name: Buildx create
        run: docker buildx create --use || echo "Builder already exists"

      # 4. Build & Push
      - name: Build and push Docker Image
        run: |
          PROJECT_ID="${{ steps.meta.outputs.PROJECT_ID }}"
          IMAGE_NAME="${{ steps.meta.outputs.IMAGE_NAME }}"
          VERSION="${{ steps.create_tag.outputs.new_tag }}"

          echo "Building: $IMAGE_NAME:$VERSION"

          docker buildx build \
            --platform linux/amd64 \
            -t gcr.io/$PROJECT_ID/$IMAGE_NAME:$VERSION \
            -t gcr.io/$PROJECT_ID/$IMAGE_NAME:latest \
            -f src/production/paper/Dockerfile \
            . \
            --push

  # -----------------------------------------------------------
  # JOB 2: Deploy & Notify
  # -----------------------------------------------------------
  deploy:
    name: Deploy
    needs: build-and-tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ needs.build-and-tag.outputs.project_id }}

      - name: Deploy Cloud Run Jobs and Scheduler
        env:
          PROJECT_ID: ${{ needs.build-and-tag.outputs.project_id }}
          REGION: us-east4
          SERVICE_ACCOUNT_EMAIL: prod-job-runner@wsb-hc-qasap-ae2e.iam.gserviceaccount.com
          NEWRELIC_API_KEY: ${{ secrets.NEWRELIC_API_KEY }}
          IB_HOST: 10.4.0.2
          IB_PORT: 4004
          IMAGE_NAME: ${{ needs.build-and-tag.outputs.docker_image }}
          IMAGE_TAG: ${{ needs.build-and-tag.outputs.new_version }}
        run: |
          set -euo pipefail

          deploy_job() {
            local JOB_NAME=$1
            local IMAGE=$2
            shift 2
            gcloud run jobs update "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --vpc-connector=run-conn-us-east4 \
              --vpc-egress=private-ranges-only \
              --max-retries 3 \
              "$@" || \
            gcloud run jobs create "$JOB_NAME" \
              --image "gcr.io/$PROJECT_ID/$IMAGE" \
              --region "$REGION" \
              --service-account "$SERVICE_ACCOUNT_EMAIL" \
              --vpc-connector=run-conn-us-east4 \
              --vpc-egress=private-ranges-only \
              --max-retries 3 \
              "$@"
          }

          deploy_scheduler() {
            local NAME=$1
            local CRON=$2
            local JOB=$3
            local TZ=$4
            gcloud scheduler jobs update http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="$TZ" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" || \
            gcloud scheduler jobs create http "$NAME" \
              --location="$REGION" \
              --schedule="$CRON" \
              --time-zone="$TZ" \
              --uri="https://$REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/$JOB:run" \
              --http-method=POST \
              --oauth-service-account-email="$SERVICE_ACCOUNT_EMAIL" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform"
          }
          
          JOB_NAME="production-paper-job"
          FULL_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"

          deploy_job "$JOB_NAME" "$FULL_IMAGE" \
            --set-env-vars=environment=prod,variant=paper,NEWRELIC_API_KEY=$NEWRELIC_API_KEY,IB_HOST=$IB_HOST,IB_PORT=$IB_PORT,IB_CLIENT_ID=1

          deploy_scheduler production-paper-scheduler "40 14 * * 1-5" production-paper-job "America/Chicago"

      # -----------------------------------------------------------
      # Notify Teams (Emulating pymsteams format)
      # -----------------------------------------------------------
      - name: Notify Teams
        if: success()
        run: |
          # 1. Get Commit Message (Sanitize double quotes)
          COMMIT_MSG=$(git log -1 --format=%s | sed 's/"/\\"/g')
          
          # 2. Prepare Variables
          VERSION="${{ needs.build-and-tag.outputs.new_version }}"
          PIPELINE="production-paper"
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          
          # 3. Construct JSON (Legacy MessageCard Format used by pymsteams)
          # Note: We use "facts" to create a nice key-value list
          cat <<EOF > payload.json
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "0076D7",
            "summary": "Deployment Successful",
            "sections": [{
              "activityTitle": "🚀 Deployment Successful",
              "activitySubtitle": "$PIPELINE",
              "facts": [
                { "name": "Version", "value": "$VERSION" },
                { "name": "Pipeline", "value": "$PIPELINE" },
                { "name": "Commit", "value": "$COMMIT_MSG" }
              ],
              "markdown": true
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View in GitHub",
              "targets": [{ "os": "default", "uri": "$RUN_URL" }]
            }]
          }
          EOF
          
          # 4. Send to Logic App
          curl -H "Content-Type: application/json" -d @payload.json "${{ secrets.TEAMS_WEBHOOK_URL }}"
